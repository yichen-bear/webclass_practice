<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23</title>
</head>
<style>
a {
    background-color: rgb(251, 190, 105);
    font-size: 15px;
    color: black;
    text-decoration: none;
    border: none;
    border-radius: 10px;
    padding: 10px;
    margin: 3px;
}

div.head {
    width: 496px;
    height: 35px;
    background-color: rgb(206, 206, 206);
    padding-right: 15px;
    padding-left: 22px;
    display: flex;
    justify-self: center;
    align-items: center;
    
}

p.left {
    color: rgb(98, 98, 98);
}

.right {
    margin-left: auto;
    border-radius: 10px;
    border: 1px solid;
    padding: 3px 18px;
    cursor: pointer;
}

div.picture {
    display: flex;
    justify-self: center;
    justify-content: center;
    width: 496px;
    height: 240px;
    background-color: rgb(255, 221, 162);
}

img {
    width: 450px;
    height: 240px;
}

div.detail {
    width: 496px;
    justify-self: center;
    display: none;
}

</style>
<body>
    <h4>exercise 23</h4>
    <div class="head">
        <p class="left">預覽</p>
        <button class="right" id="btn">查看資訊</button>
    </div>
    <div class="picture">
        <img src="https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-fall-nature-scenery-free-image.jpeg?w=1500&quality=50" alt="風景照">
    </div>
    <div class="detail" id="detailcontent">
        <p>修改日期：2026/4/27</p>
        <p>類別：JPG</p>
        <p>大小：466.97KB</p>
        <p>路徑：https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-fall-nature-scenery-free-image.jpeg?w=1500&quality=50</p>
    </div>
        
    <br><br>
    <a href="../index.html">回首頁</a>

</body>
<script>
    const btn = document.getElementById('btn');
    const content = document.getElementById('detailcontent');

    btn.addEventListener('click', function() {
        if (content.style.display === 'none') {
            content.style.display = 'block';
        } else {
            content.style.display = 'none'; 
        }
    });
</script>
</html>
